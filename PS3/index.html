<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#005a9e">
    <link rel="manifest" href="/manifest.json">
    <meta name="msapplication-TileColor" content="#005a9e">
    <meta name="msapplication-config" content="/browserconfig.xml">
    <meta property="og:title" content="nkvk4d">
    <meta property="og:description" content="а от этой картинки будет потанцевал?">
    <meta property="og:image" content="https://nkvk4d.ru/og-image.png">
    <meta property="og:url" content="https://nkvk4d.ru/PS3/index.html">
    <meta name="twitter:card" content="summary_large_image">
    <title>nkvk4d :: ps3 (WinPE Edition)</title>
    <style>
        :root {
            --win-blue: #005A9E;
            --taskbar-bg: #101214;
            --window-bg: #f0f0f0;
            --window-border: #181818;
            --text-main: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #005A9E; /* Фаллбэк для PS3 */
            background-color: var(--win-blue);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Окно Windows PE */
        .window {
            width: 90%;
            max-width: 550px;
            background-color: #f0f0f0; /* Фаллбэк для PS3 */
            background-color: var(--window-bg);
            border: 1px solid #181818; /* Фаллбэк для PS3 */
            border: 1px solid var(--window-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            position: absolute;
            z-index: 10;
            transform: scale(1);
            transition: transform 0.15s ease-out, opacity 0.15s ease-out;
        }

        /* Состояние: Окно развернуто во весь экран */
        .window.maximized {
            width: 100% !important;
            height: calc(100vh - 40px) !important;
            max-width: none !important;
            top: 0 !important;
            left: 0 !important;
            position: fixed !important;
        }

        /* Состояния: Свернуто или закрыто */
        .window.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            display: none !important;
        }

        /* Шапка окна */
        .title-bar {
            background-color: #ffffff;
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 10px;
            border-bottom: 1px solid #d9d9d9;
            cursor: default;
        }

        .title-text {
            font-size: 12px;
            color: #333333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .window-controls {
            display: flex;
            height: 100%;
        }

        /* Кнопки управления окном */
        .win-btn {
            background: transparent;
            border: none;
            width: 46px;
            height: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px; /* Чуть увеличили для читаемости на ТВ */
            color: #000000;
            cursor: default;
            transition: background 0.1s;
        }

        .win-btn:hover {
            background: #e5e5e5;
        }

        .win-btn.close-btn:hover {
            background: #e81123;
            color: #ffffff;
        }

        /* Внутреннее содержимое окна */
        .window-content {
            padding: 40px 30px;
            text-align: center;
            color: #000000; /* Фаллбэк для PS3 */
            color: var(--text-main);
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            margin: 7px;
            border: 1px solid #d9d9d9;
        }

        .window-content h1 {
            font-size: 22px;
            font-weight: 300;
            margin-bottom: 12px;
            color: #003366;
        }

        .window-content p {
            font-size: 13px;
            color: #555555;
        }

        /* Панель задач */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #101214; /* Фаллбэк для PS3 */
            background: var(--taskbar-bg);
            display: flex;
            align-items: center;
            z-index: 1000;
            padding-right: 10px;
        }

        /* Кнопка Пуск */
        .start-btn {
            height: 100%;
            width: 48px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .start-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .win-icon {
            fill: #ffffff;
            width: 18px;
            height: 18px;
        }

        .start-btn:hover .win-icon {
            fill: #00a2ed;
        }

        /* Разделитель между Пуском и запущенными приложениями */
        .taskbar-divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }

        /* Зона вкладок приложений */
        .taskbar-apps {
            display: flex;
            height: 100%;
            align-items: center;
            flex: 1;
        }

        /* Элемент приложения в таскбаре */
        .taskbar-item {
            height: 100%;
            width: 160px;
            background: transparent;
            border: none;
            color: #ffffff;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            text-align: left;
            position: relative;
            cursor: pointer;
            transition: background 0.1s;
        }

        .taskbar-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Состояние: Окно open и активно */
        .taskbar-item.active {
            background: rgba(255, 255, 255, 0.1);
        }

        .taskbar-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #0078D7;
        }

        /* Состояние: Окно минимизировано */
        .taskbar-item.minimized::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            width: 70%;
            height: 3px;
            background: #7a7a7a;
        }

        /* Состояние: Окно полностью закрыто */
        .taskbar-item.closed {
            opacity: 0.5;
        }
        .taskbar-item.closed::after {
            display: none;
        }

        .taskbar-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Меню Пуск */
        .start-menu {
            position: fixed;
            bottom: 40px;
            left: 0;
            width: 280px;
            background: #191919;
            background: rgba(25, 25, 25, 0.98);
            border: 1px solid #333333;
            border-bottom: none;
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            z-index: 999;
            transform: translateY(100%);
            opacity: 0;
            visibility: hidden;
            transition: all 0.15s ease-out;
            box-shadow: 2px -2px 15px rgba(0,0,0,0.5);
        }

        .start-menu.active {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .start-menu-title {
            color: #777777;
            font-size: 11px;
            padding: 5px 20px 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .start-menu a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            padding: 10px 20px;
            display: block;
        }

        .start-menu a:hover, .start-menu a.active {
            background: rgba(255, 255, 255, 0.08);
            border-left: 3px solid #00a2ed;
            padding-left: 17px;
        }

        /* Задний кликабельный слой для закрытия меню */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: calc(100vh - 40px);
            z-index: 998;
            display: none;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="start-menu" id="sidebar">
    <div class="start-menu-title">Навигация</div>
    <a href="/Projects/">Projects</a>
    <a href="/Lab/">Lab</a>
    <a href="/PS3/" class="active">PS3 (Запущено)</a>
    <a href="/PD2/">PD2</a>
    <a href="/J2ME/">J2ME</a>
    <a href="/Sn/">Sn</a>
    <a href="/Blog/">Blog</a>
    <a href="/Users/">Users</a>
    <a href="/Albina/">Albina</a>
</div>

<div class="window" id="windowEl">
    <div class="title-bar" id="titleBar">
        <div class="title-text">brwverchk</div>
        <div class="window-controls">
            <button class="win-btn" id="winMin" title="Свернуть">—</button>
            <button class="win-btn" id="winMax" title="Развернуть">☐</button>
            <button class="win-btn close-btn" id="winClose" title="Закрыть">✕</button>
        </div>
    </div>
    <div class="window-content" id="mainCard">
        <h1>Проверка...</h1>
    </div>
</div>

<div class="taskbar">
    <button class="start-btn" id="menuBtn" title="Пуск">
        <svg class="win-icon" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 12.4l35.6-4.8v34.8H0zm39.6-5.5L88 0v41.6H39.6zM0 46h35.6v34.8l-35.6-5zm39.6 0H88v41.6L39.6 81.3z"/>
        </svg>
    </button>
    
    <div class="taskbar-divider"></div>

    <div class="taskbar-apps">
        <button class="taskbar-item active" id="taskbarApp" title="brwverchk">
            <span style="font-size: 14px; margin-top: -2px;">*</span>
            <span>brwverchk</span>
        </button>
    </div>
</div>

<script>
    // Элементы интерфейса
    var menuBtn = document.getElementById('menuBtn');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('overlay');

    var windowEl = document.getElementById('windowEl');
    var taskbarApp = document.getElementById('taskbarApp');
    
    var winMin = document.getElementById('winMin');
    var winMax = document.getElementById('winMax');
    var winClose = document.getElementById('winClose');

    // Переменные состояния окна
    var isOpen = true;
    var isMinimized = false;
    var isMaximized = false;

    // Безопасная работа с классами (без classList)
    function addClass(el, className) {
        if (el.className.indexOf(className) === -1) {
            el.className += " " + className;
        }
    }

    function removeClass(el, className) {
        var reg = new RegExp('(\\s|^)' + className + '(\\s|$)');
        el.className = el.className.replace(reg, ' ').replace(/^\s+|\s+$/g, '');
    }

    function toggleClass(el, className) {
        if (el.className.indexOf(className) !== -1) {
            removeClass(el, className);
        } else {
            addClass(el, className);
        }
    }

    // Обновление отображения окна
    function updateWindowVisuals() {
        if (!isOpen || isMinimized) {
            addClass(windowEl, 'hidden');
        } else {
            removeClass(windowEl, 'hidden');
        }

        if (isMaximized && isOpen && !isMinimized) {
            addClass(windowEl, 'maximized');
            winMax.innerText = 'x';
        } else {
            removeClass(windowEl, 'maximized');
            winMax.innerText = 'o';
        }

        removeClass(taskbarApp, 'active');
        removeClass(taskbarApp, 'minimized');
        removeClass(taskbarApp, 'closed');
        
        if (!isOpen) {
            addClass(taskbarApp, 'closed');
        } else if (isMinimized) {
            addClass(taskbarApp, 'minimized');
        } else {
            addClass(taskbarApp, 'active');
        }
    }

    // Логика нижнего бара
    taskbarApp.onclick = function() {
        if (!isOpen) {
            isOpen = true;
            isMinimized = false;
        } else if (isMinimized) {
            isMinimized = false;
        } else {
            isMinimized = true;
        }
        updateWindowVisuals();
    };

    winMin.onclick = function(e) {
        if (e && e.stopPropagation) e.stopPropagation();
        else window.event.cancelBubble = true;
        isMinimized = true;
        updateWindowVisuals();
    };

    winMax.onclick = function(e) {
        if (e && e.stopPropagation) e.stopPropagation();
        else window.event.cancelBubble = true;
        isMaximized = !isMaximized;
        updateWindowVisuals();
    };

    winClose.onclick = function(e) {
        if (e && e.stopPropagation) e.stopPropagation();
        else window.event.cancelBubble = true;
        isOpen = false;
        isMaximized = false;
        updateWindowVisuals();
    };

    function toggleMenu() {
        toggleClass(sidebar, 'active');
        toggleClass(overlay, 'active');
    }

    menuBtn.onclick = toggleMenu;
    overlay.onclick = toggleMenu;

    // Клики по меню Пуск
    var links = sidebar.getElementsByTagName('a');
    for (var i = 0; i < links.length; i++) {
        if (links[i].className.indexOf('active') !== -1) {
            links[i].onclick = function(e) {
                if (e && e.preventDefault) e.preventDefault();
                else window.event.returnValue = false;
                
                isOpen = true;
                isMinimized = false;
                updateWindowVisuals();
                toggleMenu();
            };
        }
    }

    // --- Исправленная логика проверки PlayStation 3 ---
    var ua = navigator.userAgent.toLowerCase(); // Теперь переводим всё в нижний регистр!
    var mainCard = document.getElementById('mainCard');

    if (ua.indexOf("playstation 3") !== -1) {
        var match = ua.match(/playstation 3[; ]+([0-9.]+)/);
        var version = match ? match[1] : "неизвестна";
        
        mainCard.innerHTML = "<h1>Вы зашли с PS3</h1><p>Версия вашей прошивки: <strong>" + version + "</strong></p>";
    } else {
        mainCard.innerHTML = "<h1 style='color: #c00000; font-size: 32px;'>X</h1><p>Вы зашли не с PS3</p>";
    }
</script>

</body>
</html>
