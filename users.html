<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>nkvk4d :: users</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: rgba(25, 25, 25, 0.7); 
            --accent-color: #ffffff;
            --text-main: #f0f0f0;
            --text-dim: #888888;
            --link-color: #ffffff;
            --font-mono: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            /* Белая неоновая/киберпанк сетка */
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            margin: 0;
            padding: 40px 20px;
            font-family: var(--font-mono);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Кнопка меню */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #161616;
            color: var(--accent-color);
            border: 1px solid #333;
            padding: 10px 16px;
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            z-index: 1001;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .menu-btn:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Боковое меню */
        .sidebar {
            position: fixed;
            top: 0;
            left: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid #333;
            padding: 80px 20px 20px 20px;
            z-index: 1000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-title {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 18px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .sidebar-link::before {
            content: '▫';
            color: var(--text-dim);
            margin-right: 10px;
            transition: color 0.2s;
        }

        .sidebar-link:hover, .sidebar-link.active {
            background: #222;
            color: var(--accent-color);
            padding-left: 18px;
        }

        .sidebar-link:hover::before, .sidebar-link.active::before {
            content: '>';
            color: var(--accent-color);
        }

        /* Задний фон-затемнение */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* Основной контент */
        .container {
            max-width: 800px;
            margin: 80px auto 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            animation: fadeIn 0.8s ease-out;
        }

        .header-section {
            margin-bottom: 35px;
        }

        .users-title {
            font-size: 40px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-dim);
            margin-top: 5px;
        }

        /* Пользовательская "таблетка" (полупрозрачная капсула) */
        .user-capsule {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 12px 24px;
            border-radius: 50px; /* Эффект таблетки */
            margin-bottom: 45px;
            transition: all 0.2s ease;
            max-width: max-content;
        }

        .avatar-circle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #111;
        }

        .username {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* Блок инструкции */
        .instruction-section {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 30px;
        }

        .instruction-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .instruction-text {
            font-size: 16px;
            color: #ccc;
            line-height: 1.7;
        }

        .email-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
        }

        .email-link:hover {
            color: #ccc;
            border-bottom-color: transparent;
        }

        ::selection {
            background: var(--accent-color);
            color: #000;
        }

        @media (max-width: 650px) {
            body { padding: 20px 15px; }
            .main-card { padding: 35px 20px; }
            .container { margin-top: 70px; }
            .users-title { font-size: 32px; }
            .user-capsule { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>

<button class="menu-btn" id="menuBtn">// MENU</button>

<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-title">Навигация</div>
    <nav class="sidebar-nav">
        <a href="projects.html" class="sidebar-link">Projects</a>
        <a href="lab.html" class="sidebar-link">Lab</a>
        <a href="ps3.html" class="sidebar-link">PS3</a>
        <a href="pd2.html" class="sidebar-link">PD2</a>
        <a href="j2me.html" class="sidebar-link">J2ME</a>
        <a href="sn.html" class="sidebar-link">Sn</a>
        <a href="blog.html" class="sidebar-link">Blog</a>
        <a href="users.html" class="sidebar-link active">Users</a>
        <a href="albina.html" class="sidebar-link">Albina</a>
    </nav>
</aside>

<div class="container">
    <main class="main-card">
        
        <header class="header-section">
            <h1 class="users-title">Users</h1>
            <p class="subtitle">пользователи бывшие тут</p>
        </header>

        <div class="user-capsule">
            <img src="Avatar/nkvk.png" alt="nkvk4d Avatar" class="avatar-circle">
            <span class="username">nkvk4d</span>
        </div>

        <div class="user-capsule">
            <img src="Avatar/icon.png" alt="BreadWindFlow Avatar" class="avatar-circle">
            <span class="username">BreadWindFlow</span>
        </div>

        <section class="instruction-section">
            <h2 class="instruction-title">Инструкция</h2>
            <p class="instruction-text">
                Вы можете отметиться на этом сайте написав мне на почту <a href="mailto:nkvk4d@yandex.ru" class="email-link">nkvk4d@yandex.ru</a>, укажите свой ник и приложите свой аватар к письму.
            </p>
        </section>

    </main>
</div>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        
        if(sidebar.classList.contains('active')) {
            menuBtn.innerText = 'X CLOSE';
        } else {
            menuBtn.innerText = '// MENU';
        }
    }

    menuBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);
</script>

</body>
</html>
