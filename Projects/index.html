<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>nkvk4d :: system configuration</title>
    <style>
        /* Подключение шрифтов Nouveau IBM из той же папки */
        @font-face {
            font-family: 'Nouveau IBM';
            src: url('Nouveau_IBM.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Nouveau IBM Stretch';
            src: url('Nouveau_IBM_Stretch.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --ps2-blue: #4DB8FF;
            --ps2-yellow: #d6ca53;
            --ps2-dim: #777777;
            --ps2-bg: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--ps2-bg);
            color: var(--ps2-dim);
            font-family: 'Nouveau IBM', monospace; /* Установили основной шрифт */
            overflow: hidden;
            user-select: none;
        }

        /* Видео на фоне — смещено чуть левее */
        #bg-video {
            position: absolute;
            top: 0;
            left: -5vw; /* Физически сдвигаем контейнер влево */
            width: 110vw; /* Увеличиваем ширину, чтобы справа не было пустоты */
            height: 100vh;
            object-fit: cover;
            object-position: 35% center; /* Смещаем фокус самого видео влево */
            z-index: -1;
            opacity: 0.7;
        }

        /* Основной контейнер меню — теперь смещен еще правее */
        #ui-container {
            position: absolute;
            top: 45%;
            left: 68%; /* Сдвинули дальше вправо (было 55%) */
            transform: translateY(-50%);
            width: 400px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Желтый заголовок меню */
        #header-title {
            font-family: 'Nouveau IBM Stretch', monospace; /* Широкий шрифт для аутентичности */
            color: var(--ps2-yellow);
            font-size: 26px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-align: left;
            text-shadow: 0 0 8px rgba(214, 202, 83, 0.4);
            transition: opacity 0.2s ease;
        }

        /* Список элементов */
        #menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
        }

        .menu-item {
            font-family: 'Nouveau IBM Stretch', monospace; /* Используем stretch-версию для пунктов */
            font-size: 24px;
            letter-spacing: 1.5px;
            color: var(--ps2-dim);
            cursor: pointer;
            transition: color 0.1s ease, text-shadow 0.1s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            transform-origin: left center;
        }

        .author-span {
            font-family: 'Nouveau IBM', monospace; /* Возвращаем обычный для мелкого текста */
            font-size: 14px;
            color: #555;
            margin-left: 15px;
            letter-spacing: 0;
        }

        /* Эффект свечения выбранного пункта */
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 5px rgba(77, 184, 255, 0.4); }
            50% { text-shadow: 0 0 15px rgba(77, 184, 255, 0.8), 0 0 5px rgba(255, 255, 255, 0.5); }
            100% { text-shadow: 0 0 5px rgba(77, 184, 255, 0.4); }
        }

        .menu-item.selected {
            color: var(--ps2-blue);
            animation: pulseGlow 2s infinite;
            transform: scale(1.05);
        }

        .menu-item.selected .author-span {
            color: #888;
        }

        /* Нижняя панель с кнопками */
        #footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 60px;
        }

        .btn-prompt {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            color: #aaaaaa;
            letter-spacing: 1px;
            transition: color 0.2s, opacity 0.2s;
            cursor: pointer;
        }

        .btn-prompt:hover {
            color: #ffffff;
        }

        .svg-icon {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 0 3px currentColor);
        }

        /* Скрываем элементы плавно */
        .fade {
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <video id="bg-video" src="ps2.mp4" autoplay loop muted></video>

    <div id="ui-container">
        <div id="header-title">System Configuration</div>
        <ul id="menu-list"></ul>
    </div>

    <div id="footer">
        <div class="btn-prompt" id="btn-back" style="display: none;">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="11" stroke="#F25E5E" stroke-width="2" opacity="0.4" />
                <circle cx="12" cy="12" r="5.5" stroke="#F25E5E" stroke-width="2.5" />
            </svg>
            Back
        </div>
        <div class="btn-prompt" id="btn-enter">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="11" stroke="#7E8DF2" stroke-width="2" opacity="0.4" />
                <path d="M8.5 8.5 L15.5 15.5 M8.5 15.5 L15.5 8.5" stroke="#7E8DF2" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            Enter
        </div>
    </div>

    <script>
        // Состояние меню
        let currentScreen = 'main';
        let selectedIndex = 0;
        let selectedProjectUrl = '';

        // Структура всех экранов
        const screens = {
            main: {
                title: "nkvk4d",
                items: [
                    { label: "Menu", action: "nav" },
                    { label: "Projects", action: "projects" }
                ],
                showBack: false
            },
            nav: {
                title: "Menu",
                items: [
                    { label: "Lab", url: "/Lab/" },
                    { label: "PS3", url: "/PS3/" },
                    { label: "PD2", url: "/PD2/" },
                    { label: "J2ME", url: "/J2ME/" },
                    { label: "Sn", url: "/Sn/" },
                    { label: "Blog", url: "/Blog/" },
                    { label: "Users", url: "/Users/" },
                    { label: "Albina", url: "/Albina/" }
                ],
                showBack: true
            },
            projects: {
                title: "Projects",
                items: [
                    { label: "steamxp", url: "https://github.com/nkvk4d/steamxp" },
                    { label: "Albina", url: "https://github.com/nkvk4d/Albina" },
                    { label: "simple-graphics-stack", author: "by BreadWindFlow", url: "https://github.com/BreadAboba228/simple-graphics-stack" }
                ],
                showBack: true
            },
            confirm: {
                title: "Перейти на GitHub?",
                items: [
                    { label: "Да", action: "yes" },
                    { label: "Нет", action: "no" }
                ],
                showBack: true
            }
        };

        // Функция рендера текущего экрана
        function renderMenu() {
            const screen = screens[currentScreen];
            const titleEl = document.getElementById('header-title');
            const listEl = document.getElementById('menu-list');
            const backBtn = document.getElementById('btn-back');

            // Обновляем заголовок
            titleEl.innerText = screen.title;
            
            // Очищаем и заполняем список
            listEl.innerHTML = '';
            listEl.classList.remove('fade');
            void listEl.offsetWidth; // Сброс анимации
            listEl.classList.add('fade');

            screen.items.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'menu-item' + (index === selectedIndex ? ' selected' : '');
                
                if (item.author) {
                    li.innerHTML = `${item.label} <span class="author-span">${item.author}</span>`;
                } else {
                    li.innerText = item.label;
                }
                
                // Наведение или клик ТОЛЬКО выделяет элемент, но НЕ переходит
                li.addEventListener('mouseenter', () => {
                    selectedIndex = index;
                    updateSelection();
                });
                li.addEventListener('click', () => {
                    selectedIndex = index;
                    updateSelection();
                });
                
                listEl.appendChild(li);
            });

            // Показываем/скрываем кнопку Back
            backBtn.style.display = screen.showBack ? 'flex' : 'none';
        }

        // Обновление только классов при перемещении
        function updateSelection() {
            const items = document.querySelectorAll('.menu-item');
            items.forEach((item, index) => {
                if (index === selectedIndex) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        // Логика подтверждения выбора (вызывается кнопкой "Enter" внизу или клавиатурой)
        function handleEnter() {
            const screen = screens[currentScreen];
            const item = screen.items[selectedIndex];

            if (currentScreen === 'main') {
                currentScreen = item.action;
                selectedIndex = 0;
                renderMenu();
            } else if (currentScreen === 'nav') {
                window.location.href = item.url;
            } else if (currentScreen === 'projects') {
                selectedProjectUrl = item.url;
                screens.confirm.title = `Перейти на GitHub: ${item.label}?`;
                currentScreen = 'confirm';
                selectedIndex = 0;
                renderMenu();
            } else if (currentScreen === 'confirm') {
                if (item.action === 'yes') {
                    window.location.href = selectedProjectUrl;
                } else {
                    currentScreen = 'projects';
                    selectedIndex = 0;
                    renderMenu();
                }
            }
        }

        // Логика возврата (вызывается кнопкой "Back" внизу или клавиатурой)
        function handleBack() {
            if (currentScreen === 'nav' || currentScreen === 'projects') {
                currentScreen = 'main';
                selectedIndex = 0;
                renderMenu();
            } else if (currentScreen === 'confirm') {
                currentScreen = 'projects';
                selectedIndex = 0;
                renderMenu();
            }
        }

        // Привязываем клики к нижним кнопкам
        document.getElementById('btn-enter').addEventListener('click', handleEnter);
        document.getElementById('btn-back').addEventListener('click', handleBack);

        // Управление с клавиатуры
        window.addEventListener('keydown', (e) => {
            const screen = screens[currentScreen];
            
            if (e.key === 'ArrowUp') {
                selectedIndex = (selectedIndex - 1 + screen.items.length) % screen.items.length;
                updateSelection();
            } else if (e.key === 'ArrowDown') {
                selectedIndex = (selectedIndex + 1) % screen.items.length;
                updateSelection();
            } else if (e.key === 'Enter') {
                handleEnter();
            } else if (e.key === 'Escape' || e.key === 'Backspace') {
                handleBack();
            }
        });

        // Инициализация
        renderMenu();
    </script>
</body>
</html>
